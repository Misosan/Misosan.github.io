<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Future Capsule Pro+</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<style>
body{font-family:sans-serif;margin:0}
#map{height:55vh}
.panel{padding:12px}
input,textarea,button{width:100%;padding:8px;margin:5px 0;box-sizing:border-box}
.card{border:1px solid #ccc;padding:10px;margin:8px 0}
</style>
</head>
<body>
<div id="map"></div>
 
<div class="panel">
<h3>場所検索</h3>
<input id="searchBox" placeholder="例: 東京駅">
<button onclick="searchPlace()">検索</button>
 
<h3>タイムカプセル作成</h3>
<textarea id="message" placeholder="メッセージ"></textarea>
<input type="datetime-local" id="openDate">
<input type="number" id="groupSize" min="1" value="1" placeholder="必要人数">
<button onclick="saveCapsule()">保存</button>
 
<div id="capsules"></div>
</div>
 
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([35.68,139.76],13);
 
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);
 
let selected=null;
let tempMarker=null;
 
if("Notification" in window){
Notification.requestPermission();
}
 
map.on("click",e=>{
selected=e.latlng;
if(tempMarker) map.removeLayer(tempMarker);
tempMarker=L.marker(selected).addTo(map);
});
 
async function searchPlace(){
const q=document.getElementById("searchBox").value;
const res=await fetch(
  `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`
);
const data=await res.json();
 
if(data.length){
   const p=data[0];
   map.setView([p.lat,p.lon],15);
   if(tempMarker) map.removeLayer(tempMarker);
   tempMarker=L.marker([p.lat,p.lon]).addTo(map);
   selected={lat:Number(p.lat),lng:Number(p.lon)};
}
}
 
function getCapsules(){
return JSON.parse(localStorage.getItem("capsules")||"[]");
}
 
function saveCapsules(c){
localStorage.setItem("capsules",JSON.stringify(c));
}
 
function saveCapsule(){
if(!selected){alert("場所を選択");return;}
 
const c=getCapsules();
 
c.push({
   id:Date.now(),
   message:message.value,
   openDate:openDate.value,
   lat:selected.lat,
   lng:selected.lng,
   required:Number(groupSize.value),
   participants:0
});
 
saveCapsules(c);
render();
}
 
function distance(lat1,lon1,lat2,lon2){
const R=6371000;
const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;
const a=Math.sin(dLat/2)**2+
     Math.cos(lat1*Math.PI/180)*
     Math.cos(lat2*Math.PI/180)*
     Math.sin(dLon/2)**2;
return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
 
function joinGroup(id){
const c=getCapsules();
const cap=c.find(x=>x.id===id);
cap.participants++;
saveCapsules(c);
render();
}
 
function openCheck(id){
const cap=getCapsules().find(x=>x.id===id);
 
navigator.geolocation.getCurrentPosition(pos=>{
 
   const now=new Date();
   const openDate=new Date(cap.openDate);
 
   if(now<openDate){
      alert("まだ開封日時前");
      return;
   }
 
   if(cap.participants < cap.required){
      alert(`参加人数不足 ${cap.participants}/${cap.required}`);
      return;
   }
 
   const d=distance(
      pos.coords.latitude,
      pos.coords.longitude,
      cap.lat,
      cap.lng
   );
 
   if(d>100){
      alert("指定地点から "+Math.round(d)+"m");
      return;
   }
 
   alert("🔓\\n"+cap.message);
 
});
 
}
 
function checkNotifications(){
const caps=getCapsules();
const now=new Date();
 
caps.forEach(c=>{
   const openDate=new Date(c.openDate);
 
   if(now>=openDate && !c.notified){
      if(Notification.permission==="granted"){
        new Notification("タイムカプセル開封可能",{
          body:"指定場所へ向かってください"
        });
      }
      c.notified=true;
   }
});
 
saveCapsules(caps);
}
 
function render(){
const div=document.getElementById("capsules");
div.innerHTML="";
 
getCapsules().forEach(c=>{
 
   L.marker([c.lat,c.lng]).addTo(map);
 
   const card=document.createElement("div");
   card.className="card";
 
   card.innerHTML=`
<p>開封日:${c.openDate}</p>
<p>グループ:${c.participants}/${c.required}</p>
<button onclick="joinGroup(${c.id})">参加</button>
<button onclick="openCheck(${c.id})">開封確認</button>
   `;
 
   div.appendChild(card);
});
}
 
render();
setInterval(checkNotifications,30000);
</script>
</body>
</html>
